  mesh.rotation.y = -Math.atan2(dz, dx);

    const num = await ghIssue(`[v2 issue] ${planName} @ (${px}, ${py})`,
      `**Plan:** \`${planName}\` · standing at (${px}, ${py}) plan-inches\n\n` +
      (text ? text + '\n\n' : '') +
      (okShot ? `![view](https://raw.githubusercontent.com/${c.owner}/${c.repo}/${c.branch}/vr-notes/issues/shot-${tag}.jpg)\n` : '') +
      `\n_Filed from the plan-to-vr v2 walkthrough._`);
    alert(num ? `Issue ${typeof num === 'number' ? '#' + num + ' ' : ''}filed.` : 'Issue failed — check the connection.');
    return num;
  } catch (e) { alert('Issue failed: ' + e.message); return null; }
  finally { issueBusy = false; }
}
// ---------------------------------------------------------------- session notes
// Record the view + mic to a webm you can keep. (In VR the page canvas is what
// captureStream sees; audio always records.)
const noteRec = { active: false, rec: null, chunks: [], stream: null };
async function startNote() {
  if (noteRec.active) return;
  let audio = null;
  try { audio = await navigator.mediaDevices.getUserMedia({ audio: true }); } catch (e) {}
  const mt = ['video/webm;codecs=vp8,opus', 'video/webm'].find(t => window.MediaRecorder && MediaRecorder.isTypeSupported(t));
  if (!mt) { alert('Recording is not supported in this browser.'); return; }
  const cs = canvas.captureStream(30);
  noteRec.stream = new MediaStream([...cs.getVideoTracks(), ...(audio ? audio.getAudioTracks() : [])]);
  noteRec.chunks = [];
  try { noteRec.rec = new MediaRecorder(noteRec.stream, { mimeType: mt, videoBitsPerSecond: 2500000 }); }
  catch (e) { alert('Recorder failed: ' + e.message); return; }
  noteRec.rec.ondataavailable = e => { if (e.data.size) noteRec.chunks.push(e.data); };
  noteRec.rec.start(1000); noteRec.active = true;
  noteBtn.textContent = '⏹ stop'; noteBtn.style.background = '#b03030';
}
function stopNote() {
  if (!noteRec.active) return; noteRec.active = false;
  noteBtn.textContent = '⏺ note'; noteBtn.style.background = '#3a6a3a';
  noteRec.rec.onstop = () => {
    const blob = new Blob(noteRec.chunks, { type: noteRec.rec.mimeType });
    const url = URL.createObjectURL(blob);
    const planName = (DXF.split('/').pop() || 'plan').replace(/\.(json|dxf)$/, '');
    const a = document.createElement('a'); a.href = url;
    a.download = `note-${planName}-${new Date().toISOString().replace(/[:.]/g, '-')}.webm`;
    a.click(); setTimeout(() => URL.revokeObjectURL(url), 10000);
    if (noteRec.stream) noteRec.stream.getTracks().forEach(t => t.stop());
  };
  noteRec.rec.stop();
}
const noteBtn = document.createElement('button');
noteBtn.textContent = '⏺ note'; noteBtn.className = 'hud-btn'; noteBtn.style.background = '#3a6a3a';
noteBtn.title = 'record a view + voice note (saves a webm)';
hud.appendChild(noteBtn);
noteBtn.onclick = () => noteRec.active ? stopNote() : startNote();

const issueBtn = document.createElement('button');
issueBtn.textContent = '⚑ issue'; issueBtn.className = 'hud-btn'; issueBtn.style.background = '#7a2b3a';
issueBtn.title = 'file a GitHub issue from right here';
hud.appendChild(issueBtn);
issueBtn.onclick = () => { const t = prompt('Describe the issue (optional):') || ''; fileIssue(t); };

let prevT = 0;
renderer.setAnimationLoop((t) => {
  const dt = prevT ? Math.min(0.05, (t - prevT) / 1000) : 0.016; prevT = t;
  if (pendingRebuild) { pendingRebuild = false; build(); }   // deferred fixture swap from XR
  if (renderer.xr.isPresenting) vrTick(dt);
  else if (mode === 'walk' && !view2D) walkTick(dt);
  doorTick(dt);
  renderer.render(scene, renderer.xr.isPresenting ? camera : (view2D ? oCam : camera));
});
window.__V2 = { rebuild: build, on, walker, groundAt, colliders, dolly,
  doors: () => doors.map(d => ({ key: d.key, open: d.open })), toggleDoor,
  fixtures: () => fixtures.map(f => ({ key: f.key, name: f.name })),
  fixtureColliders: () => fixtureColliders, commitFixture, assetsForFixture, openFixtureMenu,
  planOpenings: () => planOpenings, solveAlignment, feedbackCfg,
  gyro, joy, camera, mode: () => mode,
  toggle2D: () => twoDBtn.click(), view2D: () => view2D, build2D,
  srcLayerCounts: () => srcLayerCounts, STAGE_LAYERS, subOn, SUBCATS,
  rawMode: () => rawMode, layerCat: () => layerCat, buildRaw, rawLayers: () => rawLayers,
  edits: () => edits, mergedWalls: () => mergedWalls, buildExportText, pickWall, snapMove,
  setEdit: v => { editMode = v; wallDrag = null; hoverWall = null;
    for (const w of document.querySelectorAll('.wedit')) w.classList.toggle('on', editMode); refreshEditViz(); updateEditBar(); },
  toggleWallEdit, editHover, beginWallDrag, updateWallDrag, endWallDrag };
