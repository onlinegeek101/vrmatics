<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>plan-to-vr v2 — DXF layers → 3D</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; height:100%; background:#1a1e26; color:#dfe6f2;
    font:14px system-ui,sans-serif; overflow:hidden; }
  #c { position:fixed; inset:0; display:block; }
  #panel { position:fixed; top:12px; left:12px; z-index:10; width:250px;
    background:rgba(20,24,34,.9); border:1px solid #2f3850; border-radius:12px; padding:12px 14px; }
  #panel h1 { font-size:15px; margin:0 0 2px; }
  #panel .sub { color:#8b95ac; font-size:11px; margin-bottom:10px; }
  .layer { display:flex; align-items:center; gap:9px; padding:7px 8px; border-radius:8px;
    cursor:pointer; user-select:none; border:1px solid transparent; }
  .layer:hover { background:#232b3d; }
  .layer .sw { width:14px; height:14px; border-radius:4px; flex:none; box-shadow:inset 0 0 0 1px #0004; }
  .layer .nm { flex:1; }
  .layer .st { font-size:16px; width:18px; text-align:center; }
  .layer.off { opacity:.45; }
  .layer.off .nm { text-decoration:line-through; }

  #err { position:fixed; inset:0; display:none; place-items:center; color:#ff9a9a; padding:30px; text-align:center; }
</style>
<canvas id="c"></canvas>
<div id="panel">
  <h1>plan-to-vr <span style="color:#4a86c8">v2</span></h1>
  <div class="sub">DXF layers built into 3D, in order. Toggle a layer to add/remove its stage.</div>
  <div id="layers"></div>
</div>
<div id="hint">orbit: drag / scroll, <b>click a door</b> to open it · <b>🚶 walk</b>: click to enter, <b>WASD</b> move, mouse look, <b>Shift</b> run, <b>E</b>/click door, <b>Esc</b> exit · toggle any DXF layer on the left</div>
<div id="err"></div>

<script async src="./vendor/es-module-shims.js"></script>
<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js", "three/addons/": "./vendor/addons/" } }
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { Sky } from 'three/addons/objects/Sky.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const IN2M = 0.0254;
const WALL_TH = 5, WALL_H = 96, HEAD = 84, SILL = 30, CEIL = 96;   // inches
let DXF = './sample-house.dxf';   // active plan (swapped by the layout picker)

// ---------------------------------------------------------------- DXF parse
// Minimal reader for the entities this pipeline uses: LINE, LWPOLYLINE, TEXT.
// Groups the ENTITIES section by layer; keeps color (62) + polyline elevation
// (38) so the grade layer can carry per-region floor height in Z.
function parseDXF(text) {
  const L = text.split(/\r\n|\r|\n/);
  const pairs = [];
  for (let i = 0; i + 1 < L.length; i += 2) pairs.push([L[i].trim(), L[i + 1]]);
  let s = 0;
  for (let i = 0; i < pairs.length - 1; i++)
    if (pairs[i][0] === '2' && pairs[i][1] === 'ENTITIES') { s = i + 1; break; }
  const ents = [];
  let cur = null;
  for (let i = s; i < pairs.length; i++) {
    const [code, val] = pairs[i];
    if (code === '0') {
      if (val === 'ENDSEC') break;
      cur = { type: val, layer: '0', color: 256, elev: 0, pts: [], text: '', h: 0 };
      ents.push(cur);
      continue;
    }
    if (!cur) continue;
    if (code === '8') cur.layer = val;
    else if (code === '62') cur.color = parseInt(val);
    else if (code === '38') cur.elev = parseFloat(val);
    else if (code === '1') cur.text = val;
    else if (code === '40') cur.h = parseFloat(val);
    else if (code === '10') cur._x = parseFloat(val);
    else if (code === '20') cur.pts.push([cur._x, parseFloat(val)]);
    else if (code === '11') cur._x2 = parseFloat(val);
    else if (code === '21') cur.pts.push([cur._x2, parseFloat(val)]);
  }
  return ents;
}
const byLayer = (ents, lay) => ents.filter(e => e.layer === lay);

// plan inches -> world metres. plan +y is north; map to -z so north is -z.
const wx = x => x * IN2M;
const wz = y => -y * IN2M;

// ---------------------------------------------------------------- three setup
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(2, devicePixelRatio));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.05, 500);
scene.add(new THREE.HemisphereLight(0xbcd6f2, 0x555045, 0.6));
const sun = new THREE.DirectionalLight(0xfff2dc, 2.4);
const SUN_DIR = new THREE.Vector3(6, 12, 4);
sun.position.copy(SUN_DIR); sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048); sun.shadow.bias = -0.0002;
Object.assign(sun.shadow.camera, { left: -16, right: 16, top: 16, bottom: -16, near: 1, far: 60 });
scene.add(sun); scene.add(sun.target);

// --- image-based lighting: a soft indoor env from RoomEnvironment (PMREM) ---
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
scene.environmentIntensity = 0.65;

// --- sky dome, sun placed to match the directional light ---
const sky = new Sky();
sky.scale.setScalar(4000); scene.add(sky);
Object.assign(sky.material.uniforms.turbidity, { value: 4 });
Object.assign(sky.material.uniforms.rayleigh, { value: 1.2 });
Object.assign(sky.material.uniforms.mieCoefficient, { value: 0.005 });
Object.assign(sky.material.uniforms.mieDirectionalG, { value: 0.8 });
sky.material.uniforms.sunPosition.value.copy(SUN_DIR).normalize();

// simple orbit around the house centre
const target = new THREE.Vector3(6.1, 0, -4.6);
let az = -0.7, pol = 0.9, dist = 16;
function place() {
  camera.position.set(
    target.x + dist * Math.sin(pol) * Math.cos(az),
    target.y + dist * Math.cos(pol),
    target.z + dist * Math.sin(pol) * Math.sin(az));
  camera.lookAt(target);
}
let drag = null, moved = 0;
canvas.addEventListener('pointerdown', e => { drag = { x: e.clientX, y: e.clientY }; moved = 0; });
addEventListener('pointerup', () => drag = null);
addEventListener('pointermove', e => {
  if (!drag) return;
  moved += Math.abs(e.clientX - drag.x) + Math.abs(e.clientY - drag.y);
  az -= (e.clientX - drag.x) * 0.008;
  pol = Math.max(0.15, Math.min(1.45, pol - (e.clientY - drag.y) * 0.006));
  drag = { x: e.clientX, y: e.clientY }; place();
});
addEventListener('wheel', e => { dist = Math.max(4, Math.min(40, dist * (e.deltaY > 0 ? 1.1 : 0.9))); place(); }, { passive: true });
function resize() {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize(); place();

// ---------------------------------------------------------------- materials
function mats(styled) {
  if (styled) return {
    grade: {
      '-24': new THREE.MeshStandardMaterial({ color: 0x8a8d92, roughness: 0.95 }),  // garage concrete
      '0': new THREE.MeshStandardMaterial({ color: 0xb98a4e, roughness: 0.7 }),      // main wood
    },
    wall: new THREE.MeshStandardMaterial({ color: 0xe9e3d6, roughness: 0.9 }),
    stair: new THREE.MeshStandardMaterial({ color: 0x9c6a40, roughness: 0.7 }),
    glass: new THREE.MeshStandardMaterial({ color: 0xbfe0e8, roughness: 0.1, metalness: 0, transparent: true, opacity: 0.35 }),
    leaf: new THREE.MeshStandardMaterial({ color: 0x7a4f28, roughness: 0.6 }),
    ceil: new THREE.MeshStandardMaterial({ color: 0xf3f0ea, roughness: 0.95, side: THREE.BackSide }),
    trim: new THREE.MeshStandardMaterial({ color: 0xf4f1ea, roughness: 0.6 }),
    styled: true,
  };
  const flat = new THREE.MeshStandardMaterial({ color: 0x9aa2ad, roughness: 1 });
  return { grade: { '-24': flat, '0': flat }, wall: flat, stair: flat,
    glass: new THREE.MeshStandardMaterial({ color: 0x88b0c0, transparent: true, opacity: 0.3 }),
    leaf: flat, ceil: flat, trim: flat, styled: false };
}

// ---------------------------------------------------------------- geometry helpers
function boxBetween(x1, z1, x2, z2, th, y0, y1, m) {
  const dx = x2 - x1, dz = z2 - z1, len = Math.hypot(dx, dz);
  const g = new THREE.BoxGeometry(len, (y1 - y0), th * IN2M);
  const mesh = new THREE.Mesh(g, m);
  mesh.position.set((x1 + x2) / 2, (y0 + y1) / 2, (z1 + z2) / 2);
  mesh.rotation.y = -Math.atan2(dz, dx);
  mesh.castShadow = mesh.receiveShadow = true;
  return mesh;
}

// grade region containing a plan point (for wall/furniture base height)
function gradeAt(regions, px, py) {
  for (const r of regions) if (pointIn(r.pts, px, py)) return r.elev;
  return 0;
}
function pointIn(poly, x, y) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const [xi, yi] = poly[i], [xj, yj] = poly[j];
    if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}

// ---------------------------------------------------------------- pipeline stages
const STAGES = [
  { id: 'grade', name: 'topography', color: '#8a8d92', step: '1' },
  { id: 'walls', name: 'walls', color: '#e9e3d6', step: '2' },
  { id: 'openings', name: 'doors / windows', color: '#d64550', step: '3' },
  { id: 'stairs', name: 'stairs + landings', color: '#7a5bd6', step: '4' },
  { id: 'materials', name: 'materials / styling', color: '#c8a24a', step: '5' },
  { id: 'furniture', name: 'furniture', color: '#4aa24a', step: '6' },
];
const on = { grade: true, walls: true, openings: true, stairs: true, materials: true, furniture: true };

let ENTS = null, root = null;
const gltf = new GLTFLoader();
const floors = [];        // meshes the walker stands on (grade slabs + steps)
const colliders = [];     // 2D wall segments {ax,az,bx,bz,hw} for walk collision
let doors = [];           // hinged door leaves {key,pivot,closedRot,angle,target,open,seg}
const doorState = {};     // key -> open? persisted across rebuilds/layer toggles
const DOOR_OPEN = -Math.PI / 2;   // swing angle when open

function build() {
  if (root) scene.remove(root);
  root = new THREE.Group(); scene.add(root);
  floors.length = 0; colliders.length = 0; doors = [];
  const M = mats(on.materials);
  const regions = byLayer(ENTS, 'TOPO').map(e => ({ pts: e.pts, elev: e.elev }));

  // 1. TOPOGRAPHY — a floor slab per region at its elevation
  if (on.grade) for (const r of regions) {
    // shape.y = -wz so that rotateX(-90) (world.z = -shape.y) lands it at wz(y)
    const shape = new THREE.Shape(r.pts.map(([x, y]) => new THREE.Vector2(wx(x), -wz(y))));
    const g = new THREE.ExtrudeGeometry(shape, { depth: 0.1, bevelEnabled: false });
    g.rotateX(-Math.PI / 2);                       // lie flat in xz
    const key = String(Math.round(r.elev));
    const mesh = new THREE.Mesh(g, (M.grade[key] || M.grade['0']));
    mesh.position.y = r.elev * IN2M - 0.1;         // top surface sits at the grade elevation
    mesh.receiveShadow = true; root.add(mesh); floors.push(mesh);
  }

  // wall base sits on the grade beneath its midpoint
  const walls = byLayer(ENTS, 'WALL').filter(e => e.type === 'LINE');
  const openings = byLayer(ENTS, 'OPENING').map(e => {
    const xs = e.pts.map(p => p[0]), ys = e.pts.map(p => p[1]);
    const cx = (Math.min(...xs) + Math.max(...xs)) / 2, cy = (Math.min(...ys) + Math.max(...ys)) / 2;
    const w = Math.max(...xs) - Math.min(...xs), h = Math.max(...ys) - Math.min(...ys);
    const kind = e.color === 1 ? 'door' : e.color === 5 ? 'window' : 'opening';
    return { cx, cy, len: Math.max(w, h), horiz: w >= h, kind };
  });

  // 2/3. WALLS (+ carve OPENINGS when that layer is on)
  if (on.walls) for (const w of walls) {
    const [x1, y1] = w.pts[0], [x2, y2] = w.pts[1];
    const base = gradeAt(regions, (x1 + x2) / 2, (y1 + y2) / 2) * IN2M;
    const top = base + WALL_H * IN2M;
    const ax = wx(x1), az = wz(y1), bx = wx(x2), bz = wz(y2);
    const len = Math.hypot(bx - ax, bz - az);
    const ux = (bx - ax) / len, uz = (bz - az) / len;

    // openings that lie on this wall (centre within ~4in, along the span)
    const mine = on.openings ? openings.filter(o => {
      const ox = wx(o.cx), oz = wz(o.cy);
      const t = ((ox - ax) * ux + (oz - az) * uz);
      const perp = Math.hypot(ox - (ax + ux * t), oz - (az + uz * t));
      o._t = t; return perp < 5 * IN2M && t > 0 && t < len;
    }).sort((a, b) => a._t - b._t) : [];

    const hw = WALL_TH / 2 * IN2M;
    const solid = (x1_, z1_, x2_, z2_, y0, y1) => {           // wall + collider
      root.add(boxBetween(x1_, z1_, x2_, z2_, WALL_TH, y0, y1, M.wall));
      colliders.push({ ax: x1_, az: z1_, bx: x2_, bz: z2_, hw });
      if (M.styled) root.add(boxBetween(x1_, z1_, x2_, z2_, WALL_TH + 1.4, y0, y0 + 4 * IN2M, M.trim)); // baseboard
    };
    if (!mine.length) { solid(ax, az, bx, bz, base, top); continue; }
    // solid sub-walls between openings, header over each, apron under windows
    let cut = 0;
    const P = (t) => [ax + ux * t, az + uz * t];
    for (const o of mine) {
      const half = (o.len / 2) * IN2M;
      const s = o._t - half, e = o._t + half;
      if (s > cut) { const [x, z] = P(cut), [x2_, z2_] = P(s); solid(x, z, x2_, z2_, base, top); }
      const [sx, sz] = P(s), [ex, ez] = P(e);
      const headY = base + HEAD * IN2M;
      if (headY < top) root.add(boxBetween(sx, sz, ex, ez, WALL_TH, headY, top, M.wall));     // header (walk under)
      if (o.kind === 'window') {
        const sillY = base + SILL * IN2M;
        root.add(boxBetween(sx, sz, ex, ez, WALL_TH, base, sillY, M.wall));                    // apron
        colliders.push({ ax: sx, az: sz, bx: ex, bz: ez, hw });
        root.add(boxBetween(sx, sz, ex, ez, WALL_TH * 0.4, sillY, headY, M.glass));            // glazing
      } else if (o.kind === 'door') {
        const dl = e - s, midY = (base + headY) / 2;                                            // hinged leaf
        const closedRot = -Math.atan2(ez - sz, ex - sx);
        const key = `${Math.round(o.cx)},${Math.round(o.cy)}`;
        const isOpen = !!doorState[key];
        const pivot = new THREE.Group();
        pivot.position.set(sx, 0, sz);
        pivot.rotation.y = closedRot + (isOpen ? DOOR_OPEN : 0);
        pivot.userData.doorKey = key;
        const leaf = new THREE.Mesh(new THREE.BoxGeometry(dl, headY - base, WALL_TH * 0.5 * IN2M), M.leaf);
        leaf.position.set(dl / 2, midY, 0);
        leaf.castShadow = leaf.receiveShadow = true;
        const knob = new THREE.Mesh(new THREE.SphereGeometry(0.02, 8, 6),
          new THREE.MeshStandardMaterial({ color: 0x3a3a3a, metalness: 0.7, roughness: 0.3 }));
        knob.position.set(dl - 0.06, midY, WALL_TH * 0.35 * IN2M);
        pivot.add(leaf, knob); root.add(pivot);
        doors.push({ key, pivot, closedRot, angle: isOpen ? DOOR_OPEN : 0, target: isOpen ? DOOR_OPEN : 0,
          open: isOpen, leaf, cx: (sx + ex) / 2, cz: (sz + ez) / 2,
          seg: { ax: sx, az: sz, bx: ex, bz: ez, hw } });
      }
      if (M.styled && o.kind !== 'opening') {               // proud casing frame (jambs + head)
        const jw = 3 * IN2M, ct = WALL_TH + 2, headC = headY + 3 * IN2M;
        root.add(boxBetween(...P(s), ...P(Math.min(e, s + jw)), ct, base, headC, M.trim));
        root.add(boxBetween(...P(Math.max(s, e - jw)), ...P(e), ct, base, headC, M.trim));
        root.add(boxBetween(sx, sz, ex, ez, ct, headY, headC, M.trim));
      }
      cut = e;
    }
    if (cut < len) { const [x, z] = P(cut); solid(x, z, bx, bz, base, top); }
  }

  // 5a. CEILINGS + room lights (styling layer) — one per grade region
  if (on.materials) for (const r of regions) {
    const shp = new THREE.Shape(r.pts.map(([x, y]) => new THREE.Vector2(wx(x), -wz(y))));
    const cg = new THREE.ShapeGeometry(shp); cg.rotateX(-Math.PI / 2);
    const cm = new THREE.Mesh(cg, M.ceil);
    cm.position.y = r.elev * IN2M + CEIL * IN2M;
    cm.receiveShadow = true; root.add(cm);
    const cxs = r.pts.map(p => p[0]), cys = r.pts.map(p => p[1]);
    const ccx = (Math.min(...cxs) + Math.max(...cxs)) / 2, ccy = (Math.min(...cys) + Math.max(...cys)) / 2;
    const pl = new THREE.PointLight(0xffe8c4, 6, 9, 2);
    pl.position.set(wx(ccx), r.elev * IN2M + (CEIL - 10) * IN2M, wz(ccy));
    root.add(pl);
  }

  // 4. STAIRS + landing — footprint rect; rise = the grade drop between its two
  //    ends (garage -24 to main 0), so it always lands the two floors together.
  if (on.stairs) {
    const foot = byLayer(ENTS, 'STAIR').find(e => e.type === 'LWPOLYLINE');
    if (foot) {
      const xs = foot.pts.map(p => p[0]), ys = foot.pts.map(p => p[1]);
      const x0 = Math.min(...xs), x1 = Math.max(...xs), y0 = Math.min(...ys), y1 = Math.max(...ys);
      const alongY = (y1 - y0) >= (x1 - x0);
      const runLen = alongY ? (y1 - y0) : (x1 - x0), width = alongY ? (x1 - x0) : (y1 - y0);
      const eA = alongY ? [(x0 + x1) / 2, y0] : [x0, (y0 + y1) / 2];
      const eB = alongY ? [(x0 + x1) / 2, y1] : [x1, (y0 + y1) / 2];
      const gA = gradeAt(regions, ...eA), gB = gradeAt(regions, ...eB);
      const low = Math.min(gA, gB), high = Math.max(gA, gB);
      const dir = alongY ? (gA <= gB ? 1 : -1) : (gA <= gB ? 1 : -1);   // march low -> high
      const spanLo = alongY ? (dir > 0 ? y0 : y1) : (dir > 0 ? x0 : x1);
      const N = Math.max(2, Math.round((high - low) / 8)), step = runLen / N;
      for (let i = 0; i < N; i++) {
        const cc = spanLo + dir * step * (i + 0.5);
        const cx = alongY ? (x0 + x1) / 2 : cc, cy = alongY ? cc : (y0 + y1) / 2;
        const topY = (low + (high - low) * (i + 1) / N) * IN2M;   // top of this tread
        const g = new THREE.BoxGeometry((alongY ? width : step) * IN2M, topY - low * IN2M, (alongY ? step : width) * IN2M);
        const m = new THREE.Mesh(g, M.stair);
        m.position.set(wx(cx), (low * IN2M + topY) / 2, wz(cy));
        m.castShadow = m.receiveShadow = true; root.add(m); floors.push(m);
      }
    }
  }

  // 6. FURNITURE — labelled rects → GLB from the asset catalog (fallback box)
  if (on.furniture) {
    const rects = byLayer(ENTS, 'FURN').filter(e => e.type === 'LWPOLYLINE');
    const labels = byLayer(ENTS, 'FURN').filter(e => e.type === 'TEXT');
    for (const r of rects) {
      const xs = r.pts.map(p => p[0]), ys = r.pts.map(p => p[1]);
      const cx = (Math.min(...xs) + Math.max(...xs)) / 2, cy = (Math.min(...ys) + Math.max(...ys)) / 2;
      const w = (Math.max(...xs) - Math.min(...xs)) * IN2M, d = (Math.max(...ys) - Math.min(...ys)) * IN2M;
      const lab = labels.reduce((b, t) => {
        const dx = t.pts[0][0] - cx, dy = t.pts[0][1] - cy; const dd = dx * dx + dy * dy;
        return (!b || dd < b.dd) ? { name: t.text.toLowerCase(), dd } : b; }, null);
      const base = gradeAt(regions, cx, cy) * IN2M;
      const grp = new THREE.Group(); grp.position.set(wx(cx), base, wz(cy)); root.add(grp);
      const name = lab ? lab.name : '';
      gltf.load(`./assets/${name}.glb`, g => {
        const model = g.scene;
        let bb = new THREE.Box3().setFromObject(model); const sz = bb.getSize(new THREE.Vector3());
        const s = Math.min(w / (sz.x || 1), d / (sz.z || 1));
        model.scale.setScalar(s > 0 ? s : 1);
        bb = new THREE.Box3().setFromObject(model); const c = bb.getCenter(new THREE.Vector3());
        model.position.set(-c.x, -bb.min.y, -c.z);
        model.traverse(o => { if (o.isMesh) o.castShadow = o.receiveShadow = true; });
        grp.add(model);
      }, undefined, () => {                                // fallback: labelled box
        const m = new THREE.Mesh(new THREE.BoxGeometry(w, 0.4, d),
          new THREE.MeshStandardMaterial({ color: 0x6a7a55, roughness: 0.9 }));
        m.position.y = 0.2; m.castShadow = true; grp.add(m);
      });
    }
  }
  window.__V2_READY = true;
}

// ---------------------------------------------------------------- layer UI
const layersEl = document.getElementById('layers');
for (const st of STAGES) {
  const el = document.createElement('div');
  el.className = 'layer';
  el.innerHTML = `<span class="step">${st.step}</span>
    <span class="sw" style="background:${st.color}"></span>
    <span class="nm">${st.name}</span><span class="st">●</span>`;
  el.onclick = () => { on[st.id] = !on[st.id]; el.classList.toggle('off', !on[st.id]);
    el.querySelector('.st').textContent = on[st.id] ? '●' : '○'; build(); };
  layersEl.appendChild(el);
}

// ---------------------------------------------------------------- go
fetch(DXF).then(r => r.text()).then(txt => {
  ENTS = parseDXF(txt);
  const counts = {};
  for (const e of ENTS) counts[e.layer] = (counts[e.layer] || 0) + 1;
  console.log('DXF layers parsed:', counts);
  build();
}).catch(e => {
  document.getElementById('err').style.display = 'grid';
  document.getElementById('err').textContent = 'Could not load ' + DXF + ' — ' + e.message;
});

// ---------------------------------------------------------------- walk mode
let mode = 'orbit';
const walker = { x: wx(410), z: wz(120), yaw: 3.2, pitch: 0, y: 1.6 };  // spawn in the great room
const keys = {};
addEventListener('keydown', e => { keys[e.code] = true; });
addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('click', (e) => {
  if (mode === 'walk') {
    if (document.pointerLockElement === canvas) toggleDoor((nearestDoor(walker.x, walker.z, 2.0) || {}).key);
    else canvas.requestPointerLock();
  } else if (moved < 6) doorAtScreen(e.clientX, e.clientY);   // orbit: click a door leaf to swing it
});
addEventListener('mousemove', e => {
  if (document.pointerLockElement !== canvas) return;
  walker.yaw -= e.movementX * 0.0025;
  walker.pitch = Math.max(-1.3, Math.min(1.3, walker.pitch - e.movementY * 0.0025));
});
const down = new THREE.Raycaster();
function groundAt(x, z) {
  down.set(new THREE.Vector3(x, 8, z), new THREE.Vector3(0, -1, 0));
  const hit = down.intersectObjects(floors, false)[0];
  return hit ? hit.point.y : 0;
}
function collide(x, z) {                     // push the walker out of wall segments
  const R = 0.22;
  const segs = colliders.concat(doors.filter(d => d.target === 0).map(d => d.seg));  // closed doors block
  for (const s of segs) {
    const dx = s.bx - s.ax, dz = s.bz - s.az, L2 = dx * dx + dz * dz || 1;
    let t = ((x - s.ax) * dx + (z - s.az) * dz) / L2; t = Math.max(0, Math.min(1, t));
    const px = s.ax + dx * t, pz = s.az + dz * t;
    const ox = x - px, oz = z - pz, d = Math.hypot(ox, oz), min = s.hw + R;
    if (d < min && d > 1e-4) { x = px + ox / d * min; z = pz + oz / d * min; }
  }
  return [x, z];
}
// ---- doors: swing animation + interaction ----
function doorTick(dt) {
  for (const d of doors) {
    if (Math.abs(d.angle - d.target) < 1e-3) continue;
    d.angle += (d.target - d.angle) * Math.min(1, dt * 8);
    d.pivot.rotation.y = d.closedRot + d.angle;
  }
}
function toggleDoor(key) {
  const d = doors.find(x => x.key === key); if (!d) return false;
  d.open = !d.open; d.target = d.open ? DOOR_OPEN : 0; doorState[key] = d.open; return true;
}
const doorRay = new THREE.Raycaster();
function doorAtScreen(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  doorRay.setFromCamera(new THREE.Vector2(((clientX - r.left) / r.width) * 2 - 1,
    -((clientY - r.top) / r.height) * 2 + 1), camera);
  for (const h of doorRay.intersectObjects(doors.map(d => d.leaf), false)) {
    let n = h.object; while (n && !n.userData.doorKey) n = n.parent;
    if (n && n.userData.doorKey) return toggleDoor(n.userData.doorKey);
  }
  return false;
}
function nearestDoor(x, z, maxD) {
  let best = null, bd = maxD * maxD;
  for (const d of doors) { const dd = (d.cx - x) ** 2 + (d.cz - z) ** 2; if (dd < bd) { bd = dd; best = d; } }
  return best;
}
function walkTick(dt) {
  const sp = (keys.ShiftLeft ? 4.2 : 2.3) * dt;
  const fx = Math.sin(walker.yaw), fz = Math.cos(walker.yaw);       // forward
  const rx = Math.cos(walker.yaw), rz = -Math.sin(walker.yaw);      // right
  let mx = 0, mz = 0;
  if (keys.KeyW) { mx += fx; mz += fz; }
  if (keys.KeyS) { mx -= fx; mz -= fz; }
  if (keys.KeyD) { mx += rx; mz += rz; }
  if (keys.KeyA) { mx -= rx; mz -= rz; }
  const ml = Math.hypot(mx, mz);
  if (ml > 0) {
    let [nx, nz] = collide(walker.x + mx / ml * sp, walker.z + mz / ml * sp);
    walker.x = nx; walker.z = nz;
  }
  const g = groundAt(walker.x, walker.z);
  walker.y += (g + 1.62 - walker.y) * Math.min(1, dt * 12);         // ease onto floor / steps
  camera.position.set(walker.x, walker.y, walker.z);
  const cp = Math.cos(walker.pitch);
  camera.lookAt(walker.x + fx * cp, walker.y + Math.sin(walker.pitch), walker.z + fz * cp);
}

const modeBtn = document.createElement('button');
modeBtn.textContent = '🚶 walk';
modeBtn.style.cssText = 'position:fixed;top:12px;right:12px;z-index:10;background:#2b6cb0;' +
  'color:#fff;border:none;border-radius:9px;padding:9px 15px;font:14px system-ui;cursor:pointer';
document.body.appendChild(modeBtn);
modeBtn.onclick = () => {
  if (mode === 'orbit') {
    mode = 'walk'; modeBtn.textContent = '🎥 orbit'; modeBtn.style.background = '#5a6474';
    walker.y = groundAt(walker.x, walker.z) + 1.62; canvas.requestPointerLock();
  } else {
    mode = 'orbit'; modeBtn.textContent = '🚶 walk'; modeBtn.style.background = '#2b6cb0';
    if (document.exitPointerLock) document.exitPointerLock(); place();
  }
};
addEventListener('keydown', e => {
  if (e.code === 'Escape' && mode === 'walk') modeBtn.click();
  if (e.code === 'KeyE' && mode === 'walk') { const d = nearestDoor(walker.x, walker.z, 2.0); if (d) toggleDoor(d.key); }
});

let prevT = 0;
renderer.setAnimationLoop((t) => {
  const dt = prevT ? Math.min(0.05, (t - prevT) / 1000) : 0.016; prevT = t;
  if (mode === 'walk') walkTick(dt);
  doorTick(dt);
  renderer.render(scene, camera);
});
window.__V2 = { rebuild: build, on, walker, groundAt, colliders,
  doors: () => doors.map(d => ({ key: d.key, open: d.open })), toggleDoor };
</script>
