<meta charset="utf-8">
<title>Plan-to-VR Walkthrough</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #10121a; }
  canvas { display: block; touch-action: none; }

  #toast {
    position: fixed; left: 50%; bottom: 64px; transform: translateX(-50%);
    z-index: 15; font: 13px system-ui, sans-serif; color: #eef2fa;
    background: rgba(24,28,40,.92); border: 1px solid rgba(255,255,255,.14);
    border-radius: 8px; padding: 8px 14px; opacity: 0; pointer-events: none;
    transition: opacity .25s;
  }

  #hud {
    position: fixed; top: 12px; left: 12px; z-index: 25;
    font: 12px/1.5 ui-monospace, Menlo, Consolas, monospace;
    color: #dfe6f2; background: rgba(16,18,26,.72);
    border: 1px solid rgba(255,255,255,.12); border-radius: 8px;
    padding: 10px 12px; max-width: 320px; backdrop-filter: blur(6px);
  }
  #hud h1 { font-size: 13px; margin-bottom: 6px; color: #8fb7ff; }
  #hud .row { display: flex; justify-content: space-between; gap: 16px; }
  #hud .warn { margin-top: 6px; color: #ffcf6b; }
  #hud .warn div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #hud .keys { margin-top: 8px; color: #9aa4b8; }
  #hud select {
    width: 100%; margin-bottom: 8px; font: inherit; color: inherit;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16);
    border-radius: 6px; padding: 4px 6px;
  }

  #overlay {
    position: fixed; inset: 0; z-index: 20; display: flex;
    align-items: center; justify-content: center; text-align: center;
    background: rgba(10,12,18,.55); cursor: pointer;
    font: 14px/1.6 system-ui, sans-serif; color: #eef2fa;
  }
  #overlay .card {
    background: rgba(24,28,40,.9); border: 1px solid rgba(255,255,255,.14);
    padding: 22px 28px; border-radius: 12px; max-width: 420px;
  }
  #overlay h2 { font-size: 18px; margin-bottom: 8px; }
  #overlay small { color: #9aa4b8; }
  #drop-hint {
    position: fixed; bottom: 12px; left: 12px; z-index: 10;
    font: 11px ui-monospace, monospace; color: #6b7488;
  }
  #err {
    position: fixed; inset: 0; z-index: 30; display: none;
    align-items: center; justify-content: center; text-align: center;
    font: 14px system-ui, sans-serif; color: #ffb4b4; padding: 30px;
  }
</style>

<div id="hud" hidden>
  <h1>Plan-to-VR</h1>
  <select id="plan-select">
    <option value="plan.json">Bishop-Overland — imperial ranch house</option>
    <option value="plans/zind-000.json">ZInD 000 — real home (Zillow dataset)</option>
    <option value="plans/ceco.json">Ceco.NET — metric building</option>
  </select>
  <div class="row"><span>walls</span><span id="hud-walls">0</span></div>
  <div class="row"><span>openings</span><span id="hud-openings">0</span></div>
  <div class="row"><span>fixtures</span><span id="hud-fixtures">0</span></div>
  <div class="row"><span>rooms</span><span id="hud-rooms">0</span></div>
  <div class="warn" id="hud-warn"></div>
  <div class="keys">WASD move · mouse look · <b>C</b> ceiling · <b>F</b> furniture · drag-drop a plan.json</div>
</div>

<div id="drop-hint">drop a plan.json anywhere to load it</div>

<div id="overlay">
  <div class="card">
    <h2 id="overlay-title">Click to enter walkthrough</h2>
    <div id="overlay-help">Move with <b>WASD</b>, look with the mouse, press <b>C</b> for ceiling.</div>

  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { Sky } from 'three/addons/objects/Sky.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

const IN2M = 0.0254;                 // inches -> meters (1 unit = 1 meter)
const EYE = 1.6;                     // standing eye height (m)
const Y_AXIS = new THREE.Vector3(0, 1, 0);

// ---------------------------------------------------------------- renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // cap for mobile GPUs
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;   // filmic response like a camera
renderer.toneMappingExposure = 0.9;
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

const scene = new THREE.Scene();

// image-based lighting from a procedural studio room (three.js RoomEnvironment)
// - gives PBR materials real reflections without any HDR asset
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(renderer), 0.04).texture;
const ENV_INTENSITY = 0.35;   // r160: env strength is per-material

// procedural daytime sky (Preetham model via the three.js Sky addon),
// with the sun placed where the shadow-casting light is
const SUN_DIR = new THREE.Vector3(6, 12, 4).normalize();
const sky = new Sky();
sky.scale.setScalar(4000);
sky.material.uniforms.turbidity.value = 4;
sky.material.uniforms.rayleigh.value = 1.2;
sky.material.uniforms.mieCoefficient.value = 0.004;
sky.material.uniforms.mieDirectionalG.value = 0.85;
sky.material.uniforms.sunPosition.value.copy(SUN_DIR);
scene.add(sky);

const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.05, 500);

// player rig: dolly holds the camera so VR teleport/turn move the whole player
const dolly = new THREE.Group();
dolly.add(camera);
scene.add(dolly);
camera.position.set(0, EYE, 0);

// ---------------------------------------------------------------- lights
scene.add(new THREE.HemisphereLight(0xfff4e2, 0x63594b, 0.75));
// a warm lamp that follows the player; lit only when the ceiling is on,
// since the ceiling blocks the sun
const lamp = new THREE.PointLight(0xffe8c4, 0, 9);
lamp.position.set(0, 2.2, 0);
dolly.add(lamp);

const sun = new THREE.DirectionalLight(0xfff1d9, 1.1);
sun.position.set(6, 12, 4);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
const sc = sun.shadow.camera;
sc.near = 0.5; sc.far = 60; sc.left = -20; sc.right = 20; sc.top = 20; sc.bottom = -20;
scene.add(sun);

// ---------------------------------------------------------------- materials
// Everything is generated at runtime - no image assets. The palette is a
// warm "new-England farmhouse" interior: eggshell walls, semi-gloss white
// trim, oak plank floor, stainless appliances, porcelain plumbing.

function makeWoodTexture() {
  // oak planks: rows of staggered boards with tone variation + grain lines
  const c = document.createElement('canvas');
  c.width = c.height = 512;
  const g = c.getContext('2d');
  const ROWS = 8, RH = c.height / ROWS;
  for (let r = 0; r < ROWS; r++) {
    let x = -Math.floor(Math.random() * 200);
    while (x < c.width) {
      const len = 180 + Math.random() * 220;
      const light = 34 + Math.random() * 12;
      g.fillStyle = `hsl(${24 + Math.random() * 8}, ${38 + Math.random() * 10}%, ${light}%)`;
      g.fillRect(x, r * RH, len, RH);
      // grain: faint darker streaks along the board
      g.strokeStyle = `hsla(${20 + Math.random() * 8}, 45%, ${light - 12}%, 0.25)`;
      g.lineWidth = 1;
      for (let i = 0; i < 6; i++) {
        const gy = r * RH + 4 + Math.random() * (RH - 8);
        g.beginPath();
        g.moveTo(x + 2, gy);
        g.bezierCurveTo(x + len * 0.3, gy + 2, x + len * 0.6, gy - 2, x + len - 2, gy);
        g.stroke();
      }
      // butt joint between boards
      g.fillStyle = 'rgba(40, 24, 12, 0.55)';
      g.fillRect(x + len - 1, r * RH, 2, RH);
      x += len;
    }
    // seam between rows
    g.fillStyle = 'rgba(40, 24, 12, 0.6)';
    g.fillRect(0, r * RH, c.width, 1.5);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

function std(params) {
  return new THREE.MeshStandardMaterial({ envMapIntensity: ENV_INTENSITY, ...params });
}

function makeGrassTexture() {
  // mottled lawn: layered green speckle noise
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const g = c.getContext('2d');
  g.fillStyle = '#7a9455';
  g.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 9000; i++) {
    g.fillStyle = `hsla(${85 + Math.random() * 32}, ${32 + Math.random() * 24}%, ${38 + Math.random() * 22}%, 0.5)`;
    g.fillRect(Math.random() * 256, Math.random() * 256, 2, 2);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(60, 60);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeTileTexture() {
  // 12" ceramic tiles with grout, 4x4 per canvas (= one 4 ft repeat)
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const g = c.getContext('2d');
  const T = 64;
  for (let ty = 0; ty < 4; ty++) {
    for (let tx = 0; tx < 4; tx++) {
      g.fillStyle = `hsl(${40 + Math.random() * 8}, ${8 + Math.random() * 6}%, ${82 + Math.random() * 8}%)`;
      g.fillRect(tx * T + 2, ty * T + 2, T - 4, T - 4);
    }
  }
  g.strokeStyle = 'rgba(120, 115, 105, 0.9)';
  g.lineWidth = 3;
  for (let i = 0; i <= 4; i++) {
    g.beginPath(); g.moveTo(i * T, 0); g.lineTo(i * T, 256); g.stroke();
    g.beginPath(); g.moveTo(0, i * T); g.lineTo(256, i * T); g.stroke();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

const floorTex = makeWoodTexture();
// per-room overlays get UV = position in meters (ShapeGeometry), so their
// texture repeats are set to world scale here, independent of the slab's
const roomWoodTex = makeWoodTexture();
roomWoodTex.repeat.set(1 / 1.22, 1 / 1.22);
const roomTileTex = makeTileTexture();
roomTileTex.repeat.set(1 / 1.22, 1 / 1.22);
const wallMat = std({ color: 0xf1ead9, roughness: 0.88, metalness: 0.0 });
const trimMat = std({ color: 0xfbfaf4, roughness: 0.32, metalness: 0.0 });
const floorMat = std({ map: floorTex, color: 0xd8b98e, roughness: 0.62 });
const slabMat = std({ color: 0xcfccc3, roughness: 0.92 });   // concrete under/around rooms
const roomWoodMat = std({ map: roomWoodTex, color: 0xd8b98e, roughness: 0.62 });
const roomTileMat = std({ map: roomTileTex, color: 0xf1efe9, roughness: 0.28 });
const ceilMat = std({ color: 0xf6f3ec, roughness: 0.95, side: THREE.DoubleSide });
const lightDiskMat = new THREE.MeshStandardMaterial({
  color: 0xffffff, emissive: 0xfff3dc, emissiveIntensity: 2.2, roughness: 0.4,
});
const glassMat = new THREE.MeshStandardMaterial({
  color: 0xcfe4ec, roughness: 0.05, metalness: 0.0,
  transparent: true, opacity: 0.22, envMapIntensity: 1.2, side: THREE.DoubleSide,
});
const doorMat = std({ color: 0xf7f5ef, roughness: 0.4 });

// fixture stand-ins keyed by what the block name says they are
const applianceMat = std({ color: 0xc4c8cc, roughness: 0.3, metalness: 0.75 });
const applianceDarkMat = std({ color: 0x2b2f33, roughness: 0.35, metalness: 0.4 });
const porcelainMat = std({ color: 0xf4f6f6, roughness: 0.18, metalness: 0.0 });
const counterMat = std({ color: 0xe8e4da, roughness: 0.35, metalness: 0.0 });
const fabricMat = std({ color: 0x8d7f6d, roughness: 0.95, metalness: 0.0 });
const woodMat = std({ color: 0x8a5f3c, roughness: 0.7, metalness: 0.0 });
const neutralMat = std({ color: 0x9aa0a6, roughness: 0.6, metalness: 0.1 });

// lawn the house sits on
const ground = new THREE.Mesh(
  new THREE.CircleGeometry(90, 48).rotateX(-Math.PI / 2),
  std({ map: makeGrassTexture(), color: 0xa8bd85, roughness: 1.0 })
);
ground.position.y = -0.025;
ground.receiveShadow = true;
scene.add(ground);

const FIXTURE_MATS = [
  [/REF|WASHER|DRYER|RANGE|STOVE|CKTOP|OVEN|DW/, applianceMat],
  [/TOILET|WC|TUB|BATH|SINK|LAV|SHOWER|VANITY/, porcelainMat],
  [/SOFA|COUCH|CHAIR|BED/, fabricMat],
  [/TABLE|DESK|CAB|CASE|KIT|ISLAND|COUNTER/, woodMat],
];
function fixtureMaterial(name) {
  const base = name.split('$').pop().toUpperCase();
  for (const [re, mat] of FIXTURE_MATS) if (re.test(base)) return mat;
  return neutralMat;
}

// Build a compound stand-in for a fixture from primitives - recognizable
// silhouettes (tank + bowl, drum door, burners, counter + basin) rather
// than featureless boxes. All local: floor at y=0, front toward +z.
function buildFixture(f) {
  const w = f.size[0] * IN2M, d = f.size[1] * IN2M, h = (f.height || 30) * IN2M;
  const name = (f.name || '').split('$').pop().toUpperCase();
  const g = new THREE.Group();
  const add = (geo, mat, x, y, z) => {
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, y, z);
    m.castShadow = m.receiveShadow = true;
    g.add(m);
    return m;
  };
  const rbox = (bw, bh, bd, mat, x, y, z, r = 0.02) =>
    add(new RoundedBoxGeometry(bw, bh, bd, 3, Math.min(r, bw / 3, bh / 3, bd / 3)), mat, x, y, z);

  if (/TOILET|WC/.test(name)) {
    const tankD = d * 0.3;
    rbox(w * 0.62, h * 1.9, tankD, porcelainMat, 0, h * 0.95, -(d - tankD) / 2);   // tank
    const bowl = add(new THREE.CylinderGeometry(w * 0.31, w * 0.26, h * 0.55, 20),
      porcelainMat, 0, h * 0.7, d * 0.12);
    bowl.scale.z = (d * 0.7) / (w * 0.62);                                          // oval bowl
    rbox(w * 0.6, h * 0.12, d * 0.62, porcelainMat, 0, h * 0.99, d * 0.08, 0.015);  // seat
  } else if (/TUB|BATH/.test(name)) {
    rbox(w, h, d, porcelainMat, 0, h / 2, 0, 0.04);
    add(new THREE.BoxGeometry(w * 0.78, h * 0.25, d * 0.72),
      std({ color: 0xd9e4e8, roughness: 0.15, envMapIntensity: ENV_INTENSITY }),
      0, h * 0.92, 0);                                                              // basin inset
  } else if (/WASHER|DRYER/.test(name)) {
    rbox(w, h, d, applianceMat, 0, h / 2, 0, 0.015);
    const door = add(new THREE.CylinderGeometry(Math.min(w, h) * 0.32,
      Math.min(w, h) * 0.32, 0.02, 24), applianceDarkMat, 0, h * 0.55, d / 2);
    door.rotation.x = Math.PI / 2;
    rbox(w * 0.9, h * 0.08, 0.02, applianceDarkMat, 0, h * 0.92, d / 2);            // control panel
  } else if (/RANGE|STOVE|CKTOP|OVEN/.test(name)) {
    rbox(w, h, d, applianceMat, 0, h / 2, 0, 0.015);
    for (const [bx, bz] of [[-0.25, -0.22], [0.25, -0.22], [-0.25, 0.22], [0.25, 0.22]]) {
      const b = add(new THREE.CylinderGeometry(w * 0.12, w * 0.12, 0.012, 18),
        applianceDarkMat, bx * w, h + 0.006, bz * d);
    }
  } else if (/REF/.test(name)) {
    rbox(w, h, d, applianceMat, 0, h / 2, 0, 0.02);
    rbox(0.015, h * 0.94, 0.015, applianceDarkMat, 0, h / 2, d / 2);                // door seam
    rbox(0.02, h * 0.25, 0.05, applianceDarkMat, -w * 0.28, h * 0.55, d / 2);       // handle
  } else if (/SINK|LAV|KIT|VANITY|ISLAND|COUNTER|CAB|CASE/.test(name)) {
    rbox(w, h * 0.92, d, woodMat, 0, h * 0.46, 0, 0.01);                            // cabinet
    rbox(w + 0.03, h * 0.06, d + 0.03, counterMat, 0, h * 0.97, 0, 0.008);          // countertop
    if (/SINK|LAV|KIT/.test(name)) {
      const basins = /DBL/.test(name) ? [-0.22, 0.22] : [0];
      for (const bx of basins)
        add(new THREE.BoxGeometry(w * (basins.length > 1 ? 0.34 : 0.55), 0.02, d * 0.55),
          applianceDarkMat, bx * w, h * 1.001, 0);
    }
  } else if (/SOFA|COUCH/.test(name)) {
    rbox(w, h * 0.45, d, fabricMat, 0, h * 0.225, 0, 0.04);                         // base
    rbox(w, h * 0.55, d * 0.25, fabricMat, 0, h * 0.7, -d * 0.375, 0.04);           // back
    rbox(w * 0.12, h * 0.65, d, fabricMat, -w * 0.44, h * 0.32, 0, 0.03);           // arms
    rbox(w * 0.12, h * 0.65, d, fabricMat, w * 0.44, h * 0.32, 0, 0.03);
  } else if (/BED/.test(name)) {
    rbox(w, h * 0.55, d, woodMat, 0, h * 0.27, 0, 0.02);                            // frame
    rbox(w * 0.96, h * 0.35, d * 0.96, std({ color: 0xf1efe8, roughness: 0.9, envMapIntensity: ENV_INTENSITY }),
      0, h * 0.72, 0, 0.05);                                                        // mattress
  } else if (/TABLE|DESK/.test(name)) {
    rbox(w, 0.035, d, woodMat, 0, h - 0.018, 0, 0.008);                             // top
    for (const [lx, lz] of [[-0.45, -0.45], [0.45, -0.45], [-0.45, 0.45], [0.45, 0.45]])
      add(new THREE.BoxGeometry(0.05, h - 0.035, 0.05), woodMat, lx * w, (h - 0.035) / 2, lz * d);
  } else {
    rbox(w, h, d, fixtureMaterial(f.name || ''), 0, h / 2, 0, 0.02);
  }
  return g;
}

let planGroup = null;   // holds all generated geometry
let ceiling = null;
let fixtureGroup = null;
let collisionSegs = []; // {ax, az, bx, bz, hw} solid wall spans, world XZ
let roomPolysWorld = []; // room polygons in world XZ, for interior tests

// ray-cast point-in-polygon on the XZ plane
function insideAnyRoom(x, z) {
  for (const poly of roomPolysWorld) {
    let inside = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      const [xi, zi] = poly[i], [xj, zj] = poly[j];
      if ((zi > z) !== (zj > z) &&
          x < (xj - xi) * (z - zi) / (zj - zi) + xi) inside = !inside;
    }
    if (inside) return true;
  }
  return false;
}

// ---------------------------------------------------------------- geometry
function clearPlan() {
  if (planGroup) {
    scene.remove(planGroup);
    planGroup.traverse(o => { if (o.geometry) o.geometry.dispose(); });
  }
  planGroup = null; ceiling = null; fixtureGroup = null;
  roomPolysWorld = [];
}

// Axis-aligned box placed in wall-local terms: centered at `along` on the
// centerline, pushed `out` along the wall normal, vertical span via yc/h.
function boxOnWall(group, worldStart, dir, angle, along, len, yc, h, out, thick, mat) {
  if (len <= 1e-4 || h <= 1e-4) return;
  const nrm = { x: Math.sin(angle), z: Math.cos(angle) };
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(len, h, thick), mat);
  mesh.position.set(
    worldStart.x + dir.x * along + nrm.x * out,
    yc,
    worldStart.z + dir.z * along + nrm.z * out
  );
  mesh.rotation.y = angle;
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  group.add(mesh);
}

// Dress an opening the way a finished house would: flat casing boards around
// it on both faces, a glass pane + frame for windows, and a door leaf parked
// open flat against the wall for doors.
function dressOpening(group, worldStart, dir, angle, lo, hi, op, depth, H, wallLen) {
  const CW = 3.5 * IN2M;       // casing width
  const CT = 0.6 * IN2M;       // casing proudness
  const mid = (lo + hi) / 2, w = hi - lo;
  const head = Math.min(op.head, H);
  const sill = op.sill;
  const sideBase = sill > 0 ? sill - CW : 0;

  for (const side of [1, -1]) {
    if (!faceIsInterior(worldStart, dir, angle, lo, hi, depth, side)) continue;
    const out = side * (depth / 2 + CT / 2);
    // side casings
    boxOnWall(group, worldStart, dir, angle, lo - CW / 2, CW,
      (sideBase + head) / 2, head - sideBase, out, CT, trimMat);
    boxOnWall(group, worldStart, dir, angle, hi + CW / 2, CW,
      (sideBase + head) / 2, head - sideBase, out, CT, trimMat);
    // head casing
    boxOnWall(group, worldStart, dir, angle, mid, w + 2 * CW,
      head + CW / 2, CW, out, CT, trimMat);
    if (sill > 0) {
      // window stool: a small shelf protruding past the casings
      boxOnWall(group, worldStart, dir, angle, mid, w + 2 * CW + 1 * IN2M,
        sill - 0.4 * IN2M, 0.8 * IN2M, side * (depth / 2 + 0.75 * IN2M), 1.5 * IN2M, trimMat);
    }
  }

  if (op.type === 'window') {
    // frame lining the reveal + a center pane of glass
    const FT = 1.5 * IN2M;
    boxOnWall(group, worldStart, dir, angle, mid, w, sill + FT / 2, FT, 0, depth * 0.6, trimMat);
    boxOnWall(group, worldStart, dir, angle, mid, w, head - FT / 2, FT, 0, depth * 0.6, trimMat);
    boxOnWall(group, worldStart, dir, angle, lo + FT / 2, FT, (sill + head) / 2, head - sill, 0, depth * 0.6, trimMat);
    boxOnWall(group, worldStart, dir, angle, hi - FT / 2, FT, (sill + head) / 2, head - sill, 0, depth * 0.6, trimMat);
    if (w > 30 * IN2M) {  // center mullion on wide windows
      boxOnWall(group, worldStart, dir, angle, mid, 1 * IN2M, (sill + head) / 2, head - sill, 0, depth * 0.4, trimMat);
    }
    const glass = new THREE.Mesh(
      new THREE.BoxGeometry(w - 2 * FT, head - sill - 2 * FT, 0.25 * IN2M), glassMat);
    glass.position.set(
      worldStart.x + dir.x * mid, (sill + head) / 2, worldStart.z + dir.z * mid);
    glass.rotation.y = angle;
    group.add(glass);
  }

  if (op.type === 'door') {
    // leaf parked open, flat against whichever side of the jamb has wall
    const LT = 1.75 * IN2M;
    const leafW = Math.min(w, 36 * IN2M);
    let c = null;
    if (lo - leafW >= 0) c = lo - leafW / 2;
    else if (hi + leafW <= wallLen) c = hi + leafW / 2;
    if (c !== null) {
      boxOnWall(group, worldStart, dir, angle, c, leafW,
        head / 2 - 0.5 * IN2M, head - 1 * IN2M,
        depth / 2 + CT + LT / 2, LT, doorMat);
    }
  }
}

// Trim cross-section profiles, in inches, as [out-from-wall-face, up] pairs.
// Extruded along each wall piece to make real molding - no assets.
const BASEBOARD_PROFILE = [
  [0, 0], [0.7, 0], [0.7, 4.4], [0.35, 5.5], [0, 5.5],
];
const CROWN_PROFILE = [           // simple cove: wall at bottom, ceiling at top
  [0, 0], [0.3, 0.7], [0.9, 2.9], [0.9, 3.5], [0, 3.5],
];
const CROWN_H = 3.5 * IN2M;

// Extrude a trim profile along [a0,a1] on BOTH faces of a wall piece.
// baseY: world height of the profile's y=0 line.
// Is this face of a wall span inside a room? Sample the face midpoint just
// off the wall surface. With no room data, treat every face as interior.
function faceIsInterior(worldStart, dir, angle, a0, a1, depth, side) {
  if (!roomPolysWorld.length) return true;
  const mid = (a0 + a1) / 2;
  const off = side * (depth / 2 + 0.06);
  const x = worldStart.x + dir.x * mid + Math.sin(angle) * off;
  const z = worldStart.z + dir.z * mid + Math.cos(angle) * off;
  return insideAnyRoom(x, z);
}

function addTrim(group, worldStart, dir, angle, a0, a1, depth, baseY, profile) {
  const len = a1 - a0;
  if (len <= 0.02) return;
  for (const side of [1, -1]) {
    if (!faceIsInterior(worldStart, dir, angle, a0, a1, depth, side)) continue;
    const pts = profile.map(([px, py]) =>
      new THREE.Vector2(side * (depth / 2 + px * IN2M), py * IN2M));
    if (side < 0) pts.reverse();          // keep winding CCW so normals face out
    const shape = new THREE.Shape(pts);
    const geo = new THREE.ExtrudeGeometry(shape, { depth: len, bevelEnabled: false });
    geo.rotateY(-Math.PI / 2);            // extrusion runs along the wall
    const mesh = new THREE.Mesh(geo, trimMat);
    mesh.position.set(
      worldStart.x + dir.x * a1,
      baseY,
      worldStart.z + dir.z * a1
    );
    mesh.rotation.y = angle;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);
  }
}

// Build a box piece in wall-local terms and add to `group`.
// worldStart: THREE.Vector3 at the wall's start; dir: unit XZ direction;
// a0,a1: along-wall extent (m); zb,zt: vertical extent (m); depth: thickness (m).
// wallH: full wall height (m) - pieces touching floor get baseboard, pieces
// reaching the top get crown molding, so trim runs under windows and across
// door lintels automatically.
function addPiece(group, worldStart, dir, angle, a0, a1, zb, zt, depth, wallH) {
  const len = a1 - a0;
  if (len <= 1e-4 || zt - zb <= 1e-4) return;
  const geo = new THREE.BoxGeometry(len, zt - zb, depth);
  const mesh = new THREE.Mesh(geo, wallMat);
  const along = (a0 + a1) / 2;
  mesh.position.set(
    worldStart.x + dir.x * along,
    (zb + zt) / 2,
    worldStart.z + dir.z * along
  );
  mesh.rotation.y = angle;
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  group.add(mesh);

  if (zb === 0)
    addTrim(group, worldStart, dir, angle, a0, a1, depth, 0, BASEBOARD_PROFILE);
  if (wallH && zt >= wallH - 1e-4 && wallH > 4 * CROWN_H)
    addTrim(group, worldStart, dir, angle, a0, a1, depth, wallH - CROWN_H, CROWN_PROFILE);
}

function buildPlan(plan) {
  clearPlan();
  collisionSegs = [];
  const group = new THREE.Group();
  const walls = plan.walls || [];
  const openings = plan.openings || [];

  // bounds (inches) so we can recentre the plan on the origin
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const w of walls) {
    for (const p of [w.start, w.end]) {
      minX = Math.min(minX, p[0]); maxX = Math.max(maxX, p[0]);
      minY = Math.min(minY, p[1]); maxY = Math.max(maxY, p[1]);
    }
  }
  if (!isFinite(minX)) { minX = minY = 0; maxX = maxY = 1; }
  const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;

  // plan (x,y) inches -> world (x, -y) metres, recentred
  const toWorld = (px, py) => new THREE.Vector3((px - cx) * IN2M, 0, -(py - cy) * IN2M);

  // room polygons (from the parser) drive interior-only trim, per-room
  // floors, and ceiling lights; everything degrades gracefully without them
  const rooms = plan.rooms || [];
  roomPolysWorld = rooms.map(r =>
    r.polygon.map(([px, py]) => [(px - cx) * IN2M, -(py - cy) * IN2M]));

  // group openings by wall
  const byWall = new Map();
  openings.forEach(o => {
    if (!byWall.has(o.wall_index)) byWall.set(o.wall_index, []);
    byWall.get(o.wall_index).push(o);
  });

  walls.forEach((w, wi) => {
    const S = w.start, E = w.end;
    const Lin = Math.hypot(E[0] - S[0], E[1] - S[1]);   // length, inches
    const H = (w.height || 96) * IN2M;
    const depth = (w.thickness || 6) * IN2M;
    const angle = Math.atan2(E[1] - S[1], E[0] - S[0]);
    const dir = new THREE.Vector3(Math.cos(angle), 0, -Math.sin(angle)); // world XZ dir
    const worldStart = toWorld(S[0], S[1]);

    // opening spans in metres along the wall
    const ops = (byWall.get(wi) || []).map(o => {
      const c = o.position * Lin;            // centre, inches
      return {
        lo: (c - o.width / 2) * IN2M,
        hi: (c + o.width / 2) * IN2M,
        sill: (o.sill || 0) * IN2M,
        head: Math.min((o.head || 80), w.height || 96) * IN2M,
        type: o.type || 'opening',
      };
    }).sort((a, b) => a.lo - b.lo);

    const L = Lin * IN2M;
    const solid = (a, b) => {   // blocked span -> collision segment (world XZ)
      if (b - a < 0.01) return;
      collisionSegs.push({
        ax: worldStart.x + dir.x * a, az: worldStart.z + dir.z * a,
        bx: worldStart.x + dir.x * b, bz: worldStart.z + dir.z * b,
        hw: depth / 2 + 0.03,
      });
    };
    let cursor = 0;
    for (const op of ops) {
      const lo = Math.max(0, op.lo), hi = Math.min(L, op.hi);
      if (lo > cursor) addPiece(group, worldStart, dir, angle, cursor, lo, 0, H, depth, H); // solid
      if (lo > cursor) solid(cursor, lo);
      // lintel above the opening
      if (op.head < H) addPiece(group, worldStart, dir, angle, lo, hi, op.head, H, depth, H);
      // sill below a window
      if (op.sill > 0) { addPiece(group, worldStart, dir, angle, lo, hi, 0, op.sill, depth, H); solid(lo, hi); }
      dressOpening(group, worldStart, dir, angle, lo, hi, op, depth, H, L);
      cursor = Math.max(cursor, hi);
    }
    if (cursor < L) { addPiece(group, worldStart, dir, angle, cursor, L, 0, H, depth, H); solid(cursor, L); }
  });

  // floor slab. With room data the slab is bare concrete and each room lays
  // its own finished floor: tile in baths/laundry, oak elsewhere.
  const w = (maxX - minX) * IN2M, d = (maxY - minY) * IN2M;
  floorTex.repeat.set((w + 0.3) / 1.22, (d + 0.3) / 1.22);
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(w + 0.3, d + 0.3),
    rooms.length ? slabMat : floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  group.add(floor);

  const H0 = ((walls[0] && walls[0].height) || 96) * IN2M;
  rooms.forEach((r, i) => {
    // ShapeGeometry point (sx, sy) lands at world (sx, 0, -sy) after
    // rotateX(-90), matching toWorld's recentred metres
    const pts = r.polygon.map(([px, py]) =>
      new THREE.Vector2((px - cx) * IN2M, (py - cy) * IN2M));
    const geo = new THREE.ShapeGeometry(new THREE.Shape(pts));
    geo.rotateX(-Math.PI / 2);
    const kind = r.kind || 'room';
    const mat = (kind === 'bath' || kind === 'laundry') ? roomTileMat : roomWoodMat;
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = 0.004;
    mesh.receiveShadow = true;
    group.add(mesh);

    // one recessed ceiling light per room at the centroid
    let ax = 0, ay = 0;
    for (const p of pts) { ax += p.x; ay += p.y; }
    ax /= pts.length; ay /= pts.length;
    const disk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.11, 0.11, 0.02, 20), lightDiskMat);
    disk.position.set(ax, H0 - 0.012, -ay);
    group.add(disk);
  });

  // fixtures: furniture / appliance stand-ins from CAD blocks (toggle F)
  fixtureGroup = new THREE.Group();
  for (const f of plan.fixtures || []) {
    const g = buildFixture(f);
    const pos = toWorld(f.center[0], f.center[1]);
    g.position.set(pos.x, 0, pos.z);
    g.rotation.y = (f.rotation || 0) * Math.PI / 180;  // plan y-flip keeps sense
    fixtureGroup.add(g);
  }
  group.add(fixtureGroup);

  // roof/ceiling slab (toggle with C). It deliberately does NOT cast
  // shadows, so sunlight still fills the interior - cheap fake skylighting;
  // from outside it reads as a flat roof with a fascia edge.
  const H = ((walls[0] && walls[0].height) || 96) * IN2M;
  ceiling = new THREE.Mesh(new THREE.BoxGeometry(w + 0.35, 0.14, d + 0.35), ceilMat);
  ceiling.position.y = H + 0.07;
  ceiling.receiveShadow = true;
  ceiling.visible = true;
  lamp.intensity = 0.45;
  group.add(ceiling);

  scene.add(group);
  planGroup = group;

  // start the player where a real photo was taken if the plan carries
  // localized cameras (ZInD tours); otherwise at the plan center
  const cam = (plan.cameras || []).find(c => c.is_primary) || (plan.cameras || [])[0];
  if (cam) {
    const p = toWorld(cam.position[0], cam.position[1]);
    dolly.position.set(p.x, 0, p.z);
    dolly.rotation.y = (cam.rotation || 0) * Math.PI / 180;
  } else {
    dolly.position.set(0, 0, 0);
    dolly.rotation.y = 0;
  }
  camera.rotation.set(0, 0, 0);
  camera.position.set(0, EYE, 0);

  // HUD
  const hud = document.getElementById('hud');
  hud.hidden = false;
  document.getElementById('hud-walls').textContent = walls.length;
  document.getElementById('hud-openings').textContent = openings.length;
  document.getElementById('hud-fixtures').textContent = (plan.fixtures || []).length;
  document.getElementById('hud-rooms').textContent = rooms.length;
  const warnBox = document.getElementById('hud-warn');
  const warns = plan.warnings || [];
  warnBox.innerHTML = warns.length
    ? '&#9888; ' + warns.length + ' parser warning(s):' +
      warns.slice(0, 4).map(x => '<div>· ' + x + '</div>').join('')
    : '';
}

const IS_TOUCH = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
const controls = new PointerLockControls(camera, renderer.domElement);
const overlay = document.getElementById('overlay');
if (IS_TOUCH) {
  document.getElementById('overlay-title').textContent = 'Tap to enter walkthrough';
  const touchHelp =
    '<b>move your phone</b> to look around · <b>2-finger pan</b> move · ' +
    '<b>pinch</b> walk forward/back · <b>1-finger drag</b> re-aim heading · ' +
    '<b>long-press</b> return to start';
  document.getElementById('overlay-help').innerHTML = touchHelp;
  document.querySelector('#hud .keys').innerHTML = touchHelp;
}
overlay.addEventListener('click', () => {
  if (renderer.xr.isPresenting) return;
  if (IS_TOUCH) {
    overlay.style.display = 'none';   // no pointer lock on touch
    enableGyro();                     // must happen inside a user gesture (iOS)
  } else controls.lock();
});
controls.addEventListener('lock', () => overlay.style.display = 'none');
controls.addEventListener('unlock', () => { if (!renderer.xr.isPresenting) overlay.style.display = 'flex'; });

const keys = {};
addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyC' && ceiling) {
    ceiling.visible = !ceiling.visible;
    lamp.intensity = ceiling.visible ? 0.45 : 0;
  }
  if (e.code === 'KeyF' && fixtureGroup) fixtureGroup.visible = !fixtureGroup.visible;
});
addEventListener('keyup', e => keys[e.code] = false);

function desktopMove(dt) {
  if (!controls.isLocked) return;
  const speed = 3.0 * dt;               // m/s
  if (keys['KeyW']) controls.moveForward(speed);
  if (keys['KeyS']) controls.moveForward(-speed);
  if (keys['KeyA']) controls.moveRight(-speed);
  if (keys['KeyD']) controls.moveRight(speed);
}

// ---------------------------------------------------------------- gyro look
// "Magic window": the phone's orientation drives the camera, so looking
// around means physically moving the phone. Classic DeviceOrientationControls
// math (alpha/beta/gamma -> quaternion, corrected for screen rotation).
// Touch drag then only adjusts a heading offset; pan/pinch still walk.
const gyro = {
  enabled: false, seen: false, yawOffset: 0,
  quat: new THREE.Quaternion(),
};
{
  const zee = new THREE.Vector3(0, 0, 1);
  const euler = new THREE.Euler();
  const q0 = new THREE.Quaternion();
  const qX = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)); // -90deg X
  const D2R = Math.PI / 180;
  addEventListener('deviceorientation', e => {
    if (e.alpha === null || e.beta === null) return;
    const orient = ((screen.orientation && screen.orientation.angle) ||
                    window.orientation || 0) * D2R;
    euler.set(e.beta * D2R, e.alpha * D2R, -e.gamma * D2R, 'YXZ');
    gyro.quat.setFromEuler(euler);
    gyro.quat.multiply(qX);
    gyro.quat.multiply(q0.setFromAxisAngle(zee, -orient));
    if (!gyro.seen && gyro.enabled) toast('Motion look on — move your phone');
    gyro.seen = true;
  });
}

function enableGyro() {
  // iOS requires an explicit permission request from a user gesture
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(state => { if (state === 'granted') gyro.enabled = true; })
      .catch(() => {});
  } else {
    gyro.enabled = true;
  }
}

const _yawQuat = new THREE.Quaternion();
const _yAxis = new THREE.Vector3(0, 1, 0);
function applyGyro() {
  if (!gyro.enabled || !gyro.seen) return false;
  _yawQuat.setFromAxisAngle(_yAxis, gyro.yawOffset);
  camera.quaternion.copy(_yawQuat).multiply(gyro.quat);
  return true;
}

// ---------------------------------------------------------------- touch controls
// 1 finger: look · 2-finger pan: move · pinch: walk forward/back ·
// long-press: return to the start position
const toastEl = document.getElementById('toast');
let toastTimer = null;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.style.opacity = 1;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.style.opacity = 0, 1400);
}

function resetToStart() {
  dolly.position.set(0, 0, 0);
  dolly.rotation.set(0, 0, 0);
  camera.rotation.set(0, 0, 0);
  camera.position.set(0, EYE, 0);
  gyro.yawOffset = 0;
  toast('Back at start');
}

const touch = {
  pts: new Map(),          // pointerId -> {x, y}
  lastCentroid: null,
  lastDist: null,
  longPress: null,         // timer
  startXY: null,           // long-press anchor
};
camera.rotation.order = 'YXZ';           // yaw/pitch look without roll

const LOOK_SPEED = 0.0035;               // rad per px
const PAN_SPEED = 0.011;                 // m per px
const PINCH_SPEED = 0.014;               // m per px of pinch

function groundBasis() {
  // camera heading projected onto the floor
  const fwd = new THREE.Vector3();
  camera.getWorldDirection(fwd);
  fwd.y = 0; fwd.normalize();
  const right = new THREE.Vector3(fwd.z, 0, -fwd.x).negate();
  return { fwd, right };
}

function cancelLongPress() {
  if (touch.longPress) { clearTimeout(touch.longPress); touch.longPress = null; }
}

const el = renderer.domElement;
el.addEventListener('pointerdown', e => {
  if (e.pointerType !== 'touch' || renderer.xr.isPresenting) return;
  touch.pts.set(e.pointerId, { x: e.clientX, y: e.clientY });
  touch.lastCentroid = null;
  touch.lastDist = null;
  if (touch.pts.size === 1) {
    touch.startXY = { x: e.clientX, y: e.clientY };
    touch.longPress = setTimeout(() => { touch.longPress = null; resetToStart(); }, 650);
  } else {
    cancelLongPress();
  }
});

el.addEventListener('pointermove', e => {
  if (e.pointerType !== 'touch' || !touch.pts.has(e.pointerId)) return;
  const prev = touch.pts.get(e.pointerId);
  touch.pts.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (touch.pts.size === 1) {
    if (touch.startXY && Math.hypot(e.clientX - touch.startXY.x,
                                    e.clientY - touch.startXY.y) > 12) {
      cancelLongPress();                 // moved too far: it's a look, not a press
    }
    if (gyro.enabled && gyro.seen) {
      // phone motion owns pitch/roll; a drag just re-aims the heading
      gyro.yawOffset -= (e.clientX - prev.x) * LOOK_SPEED;
    } else {
      camera.rotation.y -= (e.clientX - prev.x) * LOOK_SPEED;
      camera.rotation.x = Math.max(-1.3, Math.min(1.3,
        camera.rotation.x - (e.clientY - prev.y) * LOOK_SPEED));
    }
    return;
  }

  if (touch.pts.size === 2) {
    cancelLongPress();
    const [a, b] = [...touch.pts.values()];
    const centroid = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
    const dist = Math.hypot(a.x - b.x, a.y - b.y);
    if (touch.lastCentroid) {
      const { fwd, right } = groundBasis();
      const dx = centroid.x - touch.lastCentroid.x;
      const dy = centroid.y - touch.lastCentroid.y;
      // joystick-style pan: drag up walks forward, drag right strafes right
      dolly.position.addScaledVector(right, dx * PAN_SPEED);
      dolly.position.addScaledVector(fwd, -dy * PAN_SPEED);
      // pinch out walks forward, pinch in walks back
      dolly.position.addScaledVector(fwd, (dist - touch.lastDist) * PINCH_SPEED);
    }
    touch.lastCentroid = centroid;
    touch.lastDist = dist;
  }
});

function touchEnd(e) {
  if (e.pointerType !== 'touch') return;
  touch.pts.delete(e.pointerId);
  touch.lastCentroid = null;
  touch.lastDist = null;
  cancelLongPress();
}
el.addEventListener('pointerup', touchEnd);
el.addEventListener('pointercancel', touchEnd);

// ---------------------------------------------------------------- VR locomotion
// left thumbstick: arc-teleport   ·   right thumbstick: 45deg snap turn
const marker = new THREE.Mesh(
  new THREE.RingGeometry(0.18, 0.25, 24).rotateX(-Math.PI / 2),
  new THREE.MeshBasicMaterial({ color: 0x53d0ff })
);
marker.visible = false;
scene.add(marker);

const arcMat = new THREE.LineBasicMaterial({ color: 0x53d0ff });
const arc = new THREE.Line(new THREE.BufferGeometry(), arcMat);
arc.visible = false;
scene.add(arc);

const ctrlL = renderer.xr.getController(0);
const ctrlR = renderer.xr.getController(1);
scene.add(ctrlL, ctrlR);

let teleAiming = false, teleTarget = null, snapReady = true;

function computeArc(controller) {
  // parabola from controller along its forward (-z), gravity down
  const origin = new THREE.Vector3();
  const quat = new THREE.Quaternion();
  controller.getWorldPosition(origin);
  controller.getWorldQuaternion(quat);
  const v = new THREE.Vector3(0, 0, -1).applyQuaternion(quat).multiplyScalar(6.0);
  const g = -9.8;
  const pts = [];
  let hit = null;
  for (let i = 0; i <= 30; i++) {
    const t = i * 0.06;
    const y = origin.y + v.y * t + 0.5 * g * t * t;
    const p = new THREE.Vector3(origin.x + v.x * t, y, origin.z + v.z * t);
    pts.push(p);
    if (y <= 0 && i > 0) { p.y = 0; hit = p.clone(); break; }
  }
  return { pts, hit };
}

function teleportTo(target) {
  const cam = new THREE.Vector3();
  camera.getWorldPosition(cam);
  dolly.position.x += target.x - cam.x;
  dolly.position.z += target.z - cam.z;
}

function rotatePlayer(angle) {
  const cam = new THREE.Vector3();
  camera.getWorldPosition(cam);
  dolly.position.sub(cam);
  dolly.position.applyAxisAngle(Y_AXIS, angle);
  dolly.position.add(cam);
  dolly.rotation.y += angle;
}

function handleVRInput() {
  const session = renderer.xr.getSession();
  if (!session) return;
  for (const src of session.inputSources) {
    const gp = src.gamepad;
    if (!gp) continue;
    const ax = gp.axes;
    const stickX = ax.length >= 4 ? ax[2] : ax[0];
    const stickY = ax.length >= 4 ? ax[3] : ax[1];

    if (src.handedness === 'left') {
      if (stickY < -0.6) {                 // push forward -> aim
        teleAiming = true;
        const { pts, hit } = computeArc(ctrlL);
        arc.geometry.setFromPoints(pts);
        arc.visible = true;
        if (hit) { marker.position.copy(hit); marker.visible = true; teleTarget = hit; }
        else { marker.visible = false; teleTarget = null; }
      } else if (teleAiming) {             // released -> teleport
        teleAiming = false; arc.visible = false; marker.visible = false;
        if (teleTarget) teleportTo(teleTarget);
        teleTarget = null;
      }
    } else if (src.handedness === 'right') {
      if (Math.abs(stickX) > 0.7 && snapReady) {
        rotatePlayer(stickX > 0 ? -Math.PI / 4 : Math.PI / 4);   // 45deg snap
        snapReady = false;
      } else if (Math.abs(stickX) < 0.3) {
        snapReady = true;
      }
    }
  }
}

renderer.xr.addEventListener('sessionstart', () => { overlay.style.display = 'none'; });
renderer.xr.addEventListener('sessionend', () => {
  arc.visible = false; marker.visible = false;
  camera.position.set(0, EYE, 0);
  if (!controls.isLocked) overlay.style.display = 'flex';
});

// ---------------------------------------------------------------- collision
// classic circle-vs-segment push-out against the solid wall spans, so the
// player can pass through doorways but not through walls or windows
const PLAYER_R = 0.22;
const _cpos = new THREE.Vector3();
function resolveCollision() {
  if (!collisionSegs.length) return;
  camera.getWorldPosition(_cpos);
  for (let iter = 0; iter < 2; iter++) {
    for (const s of collisionSegs) {
      const dx = s.bx - s.ax, dz = s.bz - s.az;
      const len2 = dx * dx + dz * dz;
      if (!len2) continue;
      let t = ((_cpos.x - s.ax) * dx + (_cpos.z - s.az) * dz) / len2;
      t = Math.max(0, Math.min(1, t));
      const ox = _cpos.x - (s.ax + t * dx), oz = _cpos.z - (s.az + t * dz);
      const d = Math.hypot(ox, oz);
      const min = s.hw + PLAYER_R;
      if (d < min && d > 1e-6) {
        const push = (min - d) / d;
        _cpos.x += ox * push; _cpos.z += oz * push;
        dolly.position.x += ox * push;
        dolly.position.z += oz * push;
      }
    }
  }
}

// ---------------------------------------------------------------- loop
const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.1);
  if (renderer.xr.isPresenting) handleVRInput();
  else { desktopMove(dt); applyGyro(); }
  resolveCollision();
  renderer.render(scene, camera);
});

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---------------------------------------------------------------- load plan
function showError(msg) {
  const el = document.getElementById('err');
  el.style.display = 'flex';
  el.textContent = msg;
}

function loadPlan(plan) {
  document.getElementById('err').style.display = 'none';
  buildPlan(plan);
}

function fetchPlan(url) {
  fetch(url)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(loadPlan)
    .catch(() => {
      // file:// or missing plan.json - fall back to the embedded copy
      if (window.PLAN_TO_VR_EMBEDDED) loadPlan(window.PLAN_TO_VR_EMBEDDED);
      else showError(
        'Could not fetch ' + url + ' from this folder. ' +
        'Serve the viewer next to a plan.json (python -m http.server), ' +
        'or drag-and-drop a plan.json onto the page.'
      );
    });
}

fetchPlan('plan.json');
document.getElementById('plan-select').addEventListener('change', e => {
  fetchPlan(e.target.value);
});

// drag-and-drop a plan.json
addEventListener('dragover', e => e.preventDefault());
addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try { loadPlan(JSON.parse(reader.result)); }
    catch (err) { showError('Invalid JSON: ' + err.message); }
  };
  reader.readAsText(file);
});
</script>
